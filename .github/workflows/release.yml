name: Release

# Cut a release by pushing a semver tag, e.g. `git tag v0.1.0 && git push --tags`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: umber
            archive: umber-${{ github.ref_name }}-x86_64-linux.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: umber.exe
            archive: umber-${{ github.ref_name }}-x86_64-windows.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-dev libx11-dev \
            libvulkan-dev pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin umber

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf "${{ matrix.archive }}" \
            -C "target/${{ matrix.target }}/release" "${{ matrix.bin }}"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.bin }}" `
            -DestinationPath "${{ matrix.archive }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          files: ${{ matrix.archive }}
          generate_release_notes: true
