name: Release

# Cut a release by pushing a semver tag, e.g. `git tag v0.1.0-alpha.1 && git push --tags`.
# Produces installers (Windows MSI, Linux AppImage) plus portable archives,
# and publishes them to the GitHub Releases page for the pushed tag.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (MSI installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc --bin umber

      - name: Stage installer icon next to the binary
        shell: bash
        run: cp assets/umber.ico target/x86_64-pc-windows-msvc/release/umber.ico

      - name: Install cargo-wix
        run: cargo install cargo-wix --version 0.3.9 --locked

      - name: Build MSI installer
        shell: bash
        run: |
          # Absolute --target-bin-dir: cargo-wix may run the WiX linker (light)
          # with the package dir as CWD, so a relative `target\...` could be
          # resolved against crates/umber instead of the workspace root.
          # $GITHUB_WORKSPACE is the checkout root; backslashes in bash double
          # quotes stay literal, so the value is a clean Windows path.
          mkdir -p "$GITHUB_WORKSPACE/target/wix"
          cargo wix --no-build --nocapture \
            --target x86_64-pc-windows-msvc \
            --target-bin-dir "$GITHUB_WORKSPACE\target\x86_64-pc-windows-msvc\release" \
            --package umber \
            -o "$GITHUB_WORKSPACE/target/wix/umber-${{ github.ref_name }}-x86_64-windows.msi"

      - name: Build portable archive
        shell: bash
        run: |
          7z a "umber-${{ github.ref_name }}-x86_64-windows.zip" \
            "target/x86_64-pc-windows-msvc/release/umber.exe"

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            target/wix/umber-${{ github.ref_name }}-x86_64-windows.msi
            umber-${{ github.ref_name }}-x86_64-windows.zip

  build-linux:
    name: Linux (AppImage installer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install build + packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev libxkbcommon-dev libx11-dev libvulkan-dev \
            pkg-config squashfs-tools

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu --bin umber

      - name: Fetch AppImage tooling
        run: |
          curl -sS -L -o linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -sS -L -o appimagetool-x86_64.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage appimagetool-x86_64.AppImage

      - name: Build AppDir
        run: |
          ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run \
            --appdir AppDir \
            --executable "$GITHUB_WORKSPACE/target/x86_64-unknown-linux-gnu/release/umber" \
            --desktop-file "$GITHUB_WORKSPACE/assets/umber.desktop" \
            --icon-file "$GITHUB_WORKSPACE/assets/umber-512.png" \
            --icon-filename umber

      - name: Package AppImage installer
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run -n \
            AppDir "umber-${{ github.ref_name }}-x86_64-linux.AppImage"

      - name: Build portable archive
        run: |
          tar -czf "umber-${{ github.ref_name }}-x86_64-linux.tar.gz" \
            -C "target/x86_64-unknown-linux-gnu/release" umber

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            umber-${{ github.ref_name }}-x86_64-linux.AppImage
            umber-${{ github.ref_name }}-x86_64-linux.tar.gz